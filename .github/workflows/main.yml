name: Update MLB streak data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Generate real MLB hit streak data
        run: |
          mkdir -p data

          python << 'EOF'
          import json
          import re
          import requests
          from bs4 import BeautifulSoup
          from datetime import datetime, timezone

          url = "https://www.baseballmusings.com/cgi-bin/CurStreak.py"

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120 Safari/537.36"
          }

          response = requests.get(url, headers=headers, timeout=30)
          response.raise_for_status()

          soup = BeautifulSoup(response.text, "html.parser")

          # Convert page to readable text
          text = soup.get_text(" ", strip=True)

          # Fix Baseball Musings spacing issue
          text = text.replace("Slug%Last Game Date", "Slug% Last Game Date")

          # Remove repeated table headers
          header_pattern = re.compile(
              r"Player\s+Games\s+At\s+Bats\s+Runs\s+Hits\s+HR\s+RBI\s+BB\s+K\s+BA\s+OBA\s+Slug%\s+Last\s+Game\s+Date",
              re.IGNORECASE
          )

          text = header_pattern.sub(" ", text)

          # Keep only the section after the page title
          marker = "Current Hit Streaks"
          if marker in text:
              text = text.split(marker, 1)[-1]

          # Remove footer text so it does not get mixed in
          footer_marker = "The information used here"
          if footer_marker in text:
              text = text.split(footer_marker, 1)[0]

          # Match rows:
          # Player Games AtBats Runs Hits HR RBI BB K BA OBA SLG LastGameDate
          row_pattern = re.compile(
              r"([A-Z][A-Za-zÀ-ÖØ-öø-ÿ0-9.'’\-\s]+?)\s+"
              r"(\d+)\s+"
              r"(\d+)\s+"
              r"(\d+)\s+"
              r"(\d+)\s+"
              r"(\d+)\s+"
              r"(\d+)\s+"
              r"(\d+)\s+"
              r"(\d+)\s+"
              r"(\.\d+)\s+"
              r"(\.\d+)\s+"
              r"(\d+\.\d+|\.\d+)\s+"
              r"(\d{4}-\d{2}-\d{2})"
          )

          hits = []

          bad_words = [
              "Baseball Musings",
              "Day By Day",
              "Pledge Drive",
              "Games Through Date",
              "Submit",
              "Retrosheet",
              "Baseball Info Solutions"
          ]

          for match in row_pattern.finditer(text):
              player = " ".join(match.group(1).split()).strip()

              if any(bad in player for bad in bad_words):
                  continue

              hits.append({
                  "player": player,
                  "games": int(match.group(2)),
                  "atBats": int(match.group(3)),
                  "runs": int(match.group(4)),
                  "hits": int(match.group(5)),
                  "hr": int(match.group(6)),
                  "rbi": int(match.group(7)),
                  "bb": int(match.group(8)),
                  "k": int(match.group(9)),
                  "ba": match.group(10),
                  "oba": match.group(11),
                  "slug": match.group(12),
                  "lastGameDate": match.group(13)
              })

          hits.sort(key=lambda x: x["games"], reverse=True)

          data = {
              "updated": datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC"),
              "hits": hits,
              "hr": []
          }

          with open("data/streaks.json", "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)

          print(f"Saved {len(hits)} hit streaks")

          if len(hits) == 0:
              print("PAGE TEXT PREVIEW:")
              print(text[:3000])
              raise Exception("No hit streak data found")
          EOF

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/streaks.json
          git commit -m "Update MLB hit streak data" || echo "No changes"
          git push
