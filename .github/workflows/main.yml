name: Update MLB streak data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Create data folder
        run: mkdir -p data

      - name: Fetch hit streaks
        run: |
          curl -L -o data/streaks.html https://www.baseballmusings.com/cgi-bin/CurStreak.py

      - name: Create JSON file
        run: |
          echo '{"message":"MLB streak data updated"}' > data/streaks.json

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/
          git commit -m "Update streak data" || echo "No changes to commit"
          git push
