name: Update MLB streak data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 🔥 THIS FIXES YOUR ERROR
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Generate real hit streak data
        run: |
          mkdir -p data

          python << 'EOF'
          import json
          import re
          import requests
          from bs4 import BeautifulSoup
          from datetime import datetime, timezone

          url = "https://www.baseballmusings.com/cgi-bin/CurStreak.py"

          headers = {
              "User-Agent": "Mozilla/5.0"
          }

          response = requests.get(url, headers=headers, timeout=30)
          response.raise_for_status()

          soup = BeautifulSoup(response.text, "html.parser")

          table = soup.find("table")
          rows = table.find_all("tr")

          hits = []

          for row in rows[1:]:
              cols = [td.get_text(strip=True) for td in row.find_all("td")]

              if len(cols) < 13:
                  continue

              hits.append({
                  "player": cols[0],
                  "games": int(cols[1]),
                  "atBats": int(cols[2]),
                  "runs": int(cols[3]),
                  "hits": int(cols[4]),
                  "hr": int(cols[5]),
                  "rbi": int(cols[6]),
                  "bb": int(cols[7]),
                  "k": int(cols[8]),
                  "ba": cols[9],
                  "oba": cols[10],
                  "slug": cols[11],
                  "lastGameDate": cols[12]
              })

          data = {
              "updated": datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC"),
              "hits": hits,
              "hr": []
          }

          with open("data/streaks.json", "w") as f:
              json.dump(data, f, indent=2)

          print(f"Saved {len(hits)} hit streaks")

          if len(hits) == 0:
              raise Exception("No data scraped")
          EOF

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/streaks.json
          git commit -m "Update MLB hit streak data" || echo "No changes"
          git push
