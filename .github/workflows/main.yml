name: Update MLB streak data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Generate real MLB hit streak data
        run: |
          mkdir -p data

          python << 'EOF'
          import json
          import requests
          from bs4 import BeautifulSoup
          from datetime import datetime, timezone

          url = "https://www.baseballmusings.com/cgi-bin/CurStreak.py"

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
          }

          response = requests.get(url, headers=headers, timeout=30)
          response.raise_for_status()

          soup = BeautifulSoup(response.text, "html.parser")

          hits = []

          for row in soup.find_all("tr"):
              cols = [c.get_text(" ", strip=True) for c in row.find_all(["td", "th"])]

              if len(cols) < 14:
                  continue

              # Expected format:
              # Rank, Player, Games, At Bats, Runs, Hits, HR, RBI, BB, K, BA, OBA, Slug%, Last Game Date
              if not cols[0].isdigit():
                  continue

              try:
                  hits.append({
                      "player": cols[1],
                      "games": int(cols[2]),
                      "atBats": int(cols[3]),
                      "runs": int(cols[4]),
                      "hits": int(cols[5]),
                      "hr": int(cols[6]),
                      "rbi": int(cols[7]),
                      "bb": int(cols[8]),
                      "k": int(cols[9]),
                      "ba": cols[10],
                      "oba": cols[11],
                      "slug": cols[12],
                      "lastGameDate": cols[13]
                  })
              except Exception as e:
                  print("Skipped row:", cols)
                  print("Reason:", e)

          hits.sort(key=lambda x: x["games"], reverse=True)

          data = {
              "updated": datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC"),
              "hits": hits,
              "hr": []
          }

          with open("data/streaks.json", "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)

          print(f"Saved {len(hits)} hit streaks")

          if len(hits) == 0:
              raise Exception("No hit streak data found")
          EOF

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/streaks.json
          git commit -m "Update MLB hit streak data" || echo "No changes"
          git push
