name: Update MLB streak data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # runs daily

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Create data folder
        run: mkdir -p data

      - name: Fetch hit streaks
        run: |
          curl -o data/streaks.html https://www.baseballmusings.com/cgi-bin/CurStreak.py

      - name: Convert to JSON (simple)
        run: |
          echo '{"message": "Data pulled - parsing can be added"}' > data/streaks.json

      - name: Commit data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/
          git commit -m "Update streak data" || echo "No changes"
          git push
