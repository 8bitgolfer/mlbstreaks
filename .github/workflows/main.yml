name: Update MLB streak data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Generate real hit streak data
        run: |
          mkdir -p data

          python << 'EOF'
          import json
          import re
          import requests
          from bs4 import BeautifulSoup
          from datetime import datetime, timezone

          url = "https://www.baseballmusings.com/cgi-bin/CurStreak.py"

          headers = {
              "User-Agent": "Mozilla/5.0"
          }

          response = requests.get(url, headers=headers, timeout=30)
          response.raise_for_status()

          soup = BeautifulSoup(response.text, "html.parser")
          text = soup.get_text("\n")

          hits = []

          for line in text.splitlines():
              line = line.strip()

              if not line:
                  continue

              if line.startswith("Player") or "Games At Bats" in line:
                  continue

              match = re.match(
                  r"^(.+?)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\.\d+)\s+(\.\d+)\s+([\d.]+)\s+(\d{4}-\d{2}-\d{2})$",
                  line
              )

              if not match:
                  continue

              hits.append({
                  "player": match.group(1),
                  "games": int(match.group(2)),
                  "atBats": int(match.group(3)),
                  "runs": int(match.group(4)),
                  "hits": int(match.group(5)),
                  "hr": int(match.group(6)),
                  "rbi": int(match.group(7)),
                  "bb": int(match.group(8)),
                  "k": int(match.group(9)),
                  "ba": match.group(10),
                  "oba": match.group(11),
                  "slug": match.group(12),
                  "lastGameDate": match.group(13)
              })

          data = {
              "updated": datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC"),
              "hits": hits,
              "hr": []
          }

          with open("data/streaks.json", "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)

          print(f"Saved {len(hits)} hit streaks")

          if len(hits) == 0:
              raise Exception("No hit streak data found")
          EOF

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/streaks.json
          git commit -m "Update MLB hit streak data" || echo "No changes"
          git push
